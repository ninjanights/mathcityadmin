<div class="rounded-3xl bg-neutral-200 px-4 py-3 transition-colors duration-200 cursor-pointer dark:bg-neutral-800">
  <div class="flex items-center justify-between">
    <div class="space-y-1">
      <div class="flex items-center gap-3">
        <span
          class="material-symbols-outlined text-xl shrink-0"
          [style.color]="subjectColor()"
        >
          menu_book
        </span>

        <div class="flex items-baseline gap-3">
          <h3 class="font-semibold text-neutral-900 dark:text-neutral-100">
            {{ chapter().title }}
          </h3>

          <span class="font-mono text-xs text-neutral-400 dark:text-neutral-500">
            #{{ chapter().displayOrder }}
          </span>

          <span class="text-neutral-300 dark:text-neutral-700">•</span>

          <span class="text-xs text-neutral-500">
            {{ subjectName() }}
          </span>
        </div>
      </div>

      @if (chapter().description) {
        <p class="max-w-xl text-xs leading-5 text-neutral-500">
          {{ chapter().description }}
        </p>
      }
    </div>

    <div class="flex items-center gap-5">
      <button
        type="button"
        (click)="edit.emit(chapter())"
        class="text-sm text-neutral-500 transition hover:text-neutral-900 dark:text-neutral-400 dark:hover:text-neutral-200"
      >
        Edit
      </button>

      <button
        type="button"
        (click)="delete.emit(chapter())"
        class="text-sm text-red-500 transition hover:text-red-400"
      >
        Delete
      </button>
    </div>
  </div>
</div>
