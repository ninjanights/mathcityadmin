<div
  class="cursor-pointer rounded-3xl bg-neutral-200 px-5 py-3 transition-colors duration-200 dark:bg-neutral-800"
>
  <div class="flex items-start justify-between gap-6">

    <!-- Left -->
    <div class="min-w-0 flex-1">

      <!-- Top Row -->
      <div class="flex flex-wrap items-center gap-3">

        <span class="material-symbols-outlined text-pink-400">
          school
        </span>

        <!-- Display Order -->
        <span class="font-mono text-xs font-semibold text-neutral-500">
          #{{ lesson().displayOrder }}
        </span>

        <span class="text-neutral-400">•</span>

        <!-- Lesson -->
        <h3 class="truncate font-semibold text-neutral-900 dark:text-neutral-100">
          {{ lesson().title }}
        </h3>

        <span class="text-neutral-400">•</span>

        <!-- Slug -->
        <span
          class="font-mono text-xs text-neutral-500 dark:text-neutral-400"
        >
          /{{ lesson().slug }}
        </span>

        <span class="text-neutral-400">•</span>

        <!-- Topic -->
        <span class="text-sm text-neutral-500 dark:text-neutral-400">
          {{ lesson().topicTitle }}
        </span>

        <span class="text-neutral-400">•</span>

        <!-- Status -->
        <span
          class="rounded-full px-2.5 py-1 text-[11px] font-semibold"
          [class.bg-green-500/10]="lesson().isPublished"
          [class.text-green-500]="lesson().isPublished"
          [class.bg-neutral-500/10]="!lesson().isPublished"
          [class.text-neutral-500]="!lesson().isPublished"
        >
          {{ lesson().isPublished ? 'Live' : 'Draft' }}
        </span>

      </div>

      <!-- Bottom Row -->
      <div
        class="ml-9 mt-2 flex items-center gap-6 text-xs text-neutral-500 dark:text-neutral-400"
      >
        <span>{{ difficultyLabel(lesson().difficulty) }}</span>

        <span>{{ lesson().readingTimeMinutes }} Minutes</span>
      </div>

    </div>

    <!-- Right -->
    <div class="flex items-center gap-2">

      <button
        type="button"
        (click)="lessonTags.emit(lesson())"
        class="rounded-full bg-neutral-700 px-3 py-1 text-xs font-medium text-neutral-400 transition hover:bg-neutral-500"
      >
        Tags
      </button>

      <button
        type="button"
        (click)="lessonResources.emit(lesson())"
        class="rounded-full bg-neutral-700 px-3 py-1 text-xs font-medium text-neutral-400 transition hover:bg-neutral-500"
      >
        Resources
      </button>

      <button
        type="button"
        (click)="practiceQuestions.emit(lesson())"
        class="rounded-full bg-neutral-700 px-3 py-1 text-xs font-medium text-neutral-400 transition hover:bg-neutral-500"
      >
        Questions
      </button>

      <button
        type="button"
        (click)="edit.emit(lesson())"
        class="text-sm text-neutral-500 transition hover:text-neutral-900 dark:text-neutral-400 dark:hover:text-neutral-200"
      >
        Edit
      </button>

      <button
        type="button"
        (click)="delete.emit(lesson())"
        class="text-sm text-red-500 transition hover:text-red-400"
      >
        Delete
      </button>

    </div>

  </div>
</div>
