<div class="rounded-3xl bg-neutral-200 p-6 dark:bg-neutral-800">
  <div class="mb-10">
    <button
      type="button"
      (click)="cancel.emit()"
      class="mb-6 flex items-center gap-2 text-sm font-medium text-neutral-500 transition hover:text-neutral-900 dark:hover:text-neutral-300"
    >
      <span class="material-symbols-outlined text-base"> arrow_back_ios_new </span>

      Back to Lessons
    </button>

    <h1 class="text-3xl font-bold text-neutral-900 dark:text-neutral-100">
      {{ lesson() ? 'Edit Lesson' : 'Create Lesson' }}
    </h1>

    <p class="mt-2 text-sm text-neutral-500">
      {{ lesson() ? 'Update this lesson.' : 'Create a lesson under a topic.' }}
    </p>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="max-w-5xl space-y-6">
    <!-- Topic -->

    <div>
      <label class="mb-3 block text-sm font-medium text-neutral-500"> Topic </label>

      <div class="flex items-center gap-3">
        <button
          type="button"
          (click)="previousTopics()"
          [disabled]="startIndex() === 0"
          class="flex h-10 w-10 items-center justify-center rounded-full bg-neutral-100 dark:bg-[#313131]"
        >
          <span class="material-symbols-outlined"> chevron_left </span>
        </button>

        <div class="flex flex-1 justify-center gap-2">
          @for (topic of visibleTopics(); track topic.id) {
            <button
              type="button"
              (click)="selectTopic(topic)"
              [class]="
                selectedTopicId() === topic.id
                  ? 'rounded-full bg-pink-400 px-5 py-2 text-sm font-semibold text-black'
                  : 'rounded-full bg-neutral-100 dark:bg-[#313131] px-5 py-2 text-sm'
              "
            >
              {{ topic.title }}
            </button>
          }
        </div>

        <button
          type="button"
          (click)="nextTopics()"
          [disabled]="startIndex() + visibleCount >= topics().length"
          class="flex h-10 w-10 items-center justify-center rounded-full bg-neutral-100 dark:bg-[#313131]"
        >
          <span class="material-symbols-outlined"> chevron_right </span>
        </button>
      </div>
    </div>

    <!-- Title -->

    <div>
      <label class="mb-2 block text-sm font-medium"> Title </label>

      <input
        formControlName="title"
        placeholder="Introduction"
        class="w-full rounded-xl bg-neutral-100 dark:bg-[#313131] px-4 py-3"
      />
    </div>

    <!-- Summary -->

    <div>
      <label class="mb-2 block text-sm font-medium"> Summary </label>

      <textarea
        rows="3"
        formControlName="summary"
        class="w-full rounded-xl bg-neutral-100 dark:bg-[#313131] px-4 py-3"
      >
      </textarea>
    </div>

    <!-- Markdown -->

    <div>
      <label class="mb-2 block text-sm font-medium"> Markdown Content </label>

      <textarea
        rows="12"
        formControlName="markdownContent"
        class="w-full rounded-xl bg-neutral-100 dark:bg-[#313131] px-4 py-3 font-mono"
      >
      </textarea>
    </div>

    <!-- Difficulty -->

    <div>
      <label class="mb-2 block text-sm font-medium"> Difficulty </label>

      <select
        formControlName="difficulty"
        class="w-full rounded-xl bg-neutral-100 dark:bg-[#313131] px-4 py-3"
      >
        <option [value]="0">Beginner</option>
        <option [value]="1">Intermediate</option>
        <option [value]="2">Advanced</option>
      </select>
    </div>

    <!-- Reading Time -->

    <div>
      <label class="mb-2 block text-sm font-medium"> Reading Time (minutes) </label>

      <input
        type="number"
        formControlName="readingTimeMinutes"
        class="w-full rounded-xl bg-neutral-100 dark:bg-[#313131] px-4 py-3"
      />
    </div>

    <!-- Thumbnail -->

    <div>
      <label class="mb-2 block text-sm font-medium"> Thumbnail URL </label>

      <input
        formControlName="thumbnailUrl"
        class="w-full rounded-xl bg-neutral-100 dark:bg-[#313131] px-4 py-3"
      />
    </div>

    <!-- Published -->

    <label class="flex items-center gap-3">
      <input type="checkbox" formControlName="isPublished" />

      <span>Published</span>
    </label>

    <!-- Display Order -->

    <div>
      <label class="mb-3 block text-sm font-medium"> Display Order </label>

      <div class="flex flex-wrap gap-2">
        @for (position of positions(); track position) {
          <button
            type="button"
            (click)="form.controls.displayOrder.setValue(position)"
            [class]="
              form.controls.displayOrder.value === position
                ? 'rounded-full bg-pink-400 px-3 py-1.5'
                : 'rounded-full bg-neutral-100 dark:bg-[#313131] px-3 py-1.5'
            "
          >
            {{ position }}
          </button>
        }
      </div>
    </div>

    <div class="flex justify-end gap-4 pt-8">
      <button type="button" (click)="cancel.emit()" class="rounded-full px-6 py-3">Cancel</button>

      <button
        type="submit"
        [disabled]="form.invalid"
        class="rounded-full bg-pink-400 px-8 py-3 font-bold text-black"
      >
        {{ lesson() ? 'Update Lesson' : 'Create Lesson' }}
      </button>
    </div>
  </form>
</div>
