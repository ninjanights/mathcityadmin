@if (lessons().length) {
  <div class="flex flex-col gap-2">
    @for (lesson of lessons(); track lesson.id) {
      <app-lesson-card
        [lesson]="lesson"
        [topicTitle]="topicTitle(lesson.topicId)"
        (edit)="edit.emit($event)"
        (delete)="delete.emit($event)"
      >
      </app-lesson-card>
    }
  </div>
} @else {
  <p class="text-neutral-500 dark:text-neutral-400">
    No lessons found.
  </p>
}
