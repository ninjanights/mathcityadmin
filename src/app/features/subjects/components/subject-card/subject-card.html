<div class="rounded-3xl bg-neutral-200 px-4 py-3 transition-colors duration-200 cursor-pointer dark:bg-neutral-800">
  <div class="flex items-center justify-between">
    <!-- Content -->
    <div class="space-y-1">
      <!-- Header -->
      <div class="flex items-center gap-3">
        <!-- Icon -->
        <span class="material-symbols-outlined text-xl shrink-0" [style.color]="subject().color">
          {{ subject().icon || 'school' }}
        </span>

        <div class="flex items-baseline gap-3">
          <!-- Name -->
          <h3 class="font-semibold text-neutral-900 dark:text-neutral-100">
            {{ subject().name }}
          </h3>

          <!-- Slug -->
          <span class="font-mono text-xs text-neutral-400 dark:text-neutral-500"> /{{ subject().slug }} </span>

          <!-- Separator -->
          <span class="text-neutral-300 dark:text-neutral-700">•</span>

          <!-- Status -->
          <div class="flex items-center gap-2">
            <span
              class="text-xs"
              [class.text-pink-400]="subject().isPublished"
              [class.text-neutral-400]="!subject().isPublished"
            >
              {{ subject().isPublished ? 'Live' : 'Draft' }}
            </span>
          </div>
        </div>
      </div>

      <!-- Description -->
      @if (subject().description) {
        <p class="max-w-xl text-xs leading-5 text-neutral-500 dark:text-neutral-500">
          {{ subject().description }}
        </p>
      }
    </div>

    <!-- Right -->
    <div class="flex items-center gap-5">
      <div
        class="h-4 w-4 rounded-full border border-neutral-200 dark:border-neutral-700"
        [style.background]="subject().color"
      ></div>

      <button
        type="button"
        (click)="edit.emit(subject())"
        class="text-sm text-neutral-500 transition hover:text-neutral-900 dark:text-neutral-400 dark:hover:text-neutral-200"
      >
        Edit
      </button>

      <button
        type="button"
        (click)="publish.emit(subject())"
        class="text-sm text-neutral-500 transition hover:text-neutral-900 dark:text-neutral-400 dark:hover:text-neutral-200"
      >
        {{ subject().isPublished ? 'Unpublish' : 'Publish' }}
      </button>

      <button
        type="button"
        (click)="delete.emit(subject())"
        class="text-sm text-red-500 transition hover:text-red-400"
      >
        Delete
      </button>
    </div>
  </div>
</div>
