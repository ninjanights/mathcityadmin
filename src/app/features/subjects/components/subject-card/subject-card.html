<div class="rounded-xl bg-neutral-800 p-5 shadow-lg border border-neutral-700/50 hover:border-neutral-600 transition-all duration-200">
  <div class="flex items-center justify-between">
    <h3 class="text-lg font-semibold" [style.color]="subject().color || '#EAB308'">
      {{ subject().name }}
    </h3>

    <span class="text-2xl">
      {{ subject().icon || '📚' }}
    </span>
  </div>

  <p class="mt-2 text-sm text-neutral-400 font-mono">
    /{{ subject().slug }}
  </p>

  <div class="mt-4 flex items-center justify-end gap-3 border-t border-neutral-700/50 pt-3">
    <button 
      (click)="edit.emit(subject())" 
      class="text-xs font-semibold text-yellow-400 hover:text-yellow-300 transition-colors cursor-pointer">
      Edit
    </button>
    <button 
      (click)="publish.emit(subject())" 
      class="text-xs font-semibold text-blue-400 hover:text-blue-300 transition-colors cursor-pointer">
      Publish
    </button>
    <button 
      (click)="delete.emit(subject())" 
      class="text-xs font-semibold text-red-400 hover:text-red-300 transition-colors cursor-pointer">
      Delete
    </button>
  </div>
</div>
