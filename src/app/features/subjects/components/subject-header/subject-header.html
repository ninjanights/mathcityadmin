<div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between rounded-3xl bg-neutral-200 px-4 py-3 dark:bg-neutral-800">
  <div>
    <h1 class="text-3xl font-bold text-neutral-900 dark:text-neutral-200">Subjects</h1>

    <p class="mt-1 text-sm text-neutral-500 dark:text-neutral-500">Manage all learning Subjects.</p>
  </div>

  <div class="flex flex-wrap items-center gap-3">
    <app-subject-search (searchChanged)="onSearch($event)"> </app-subject-search>

    <div class="flex items-center gap-1 rounded-full 
    bg-neutral-100 p-1 text-sm dark:bg-[#313131]">
      <button
        type="button"
        (click)="setSort('asc')"
        [class]="
          sortDirection === 'asc'
            ? 'rounded-full bg-neutral-200 px-4 py-1.5 text-pink-400 transition dark:bg-neutral-800'
            : 'rounded-full px-4 py-1.5 text-neutral-500 transition hover:text-neutral-900 dark:text-neutral-400 dark:hover:text-neutral-200'
        "
      >
        Asc
      </button>

      <span class="text-neutral-300 dark:text-neutral-600">•</span>

      <button
        type="button"
        (click)="setSort('desc')"
        [class]="
          sortDirection === 'desc'
            ? 'rounded-full bg-neutral-200 px-4 py-1.5 text-pink-400 transition dark:bg-neutral-800'
            : 'rounded-full px-4 py-1.5 text-neutral-500 transition hover:text-neutral-900 dark:text-neutral-400 dark:hover:text-neutral-200'
        "
      >
        Desc
      </button>
    </div>

    <button
      (click)="create.emit()"
      class="rounded-full bg-pink-400 px-5 py-2 text-sm text-black transition font-bold hover:bg-pink-400 cusor-pointer"
    >
      + Add Subject
    </button>
  </div>
</div>
