<div class="mb-8 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
  <div>
    <h1 class="text-3xl font-bold text-neutral-200">Subjects</h1>

    <p class="mt-1 text-sm text-neutral-500">Manage all learning Subjects.</p>
  </div>

  <div class="flex flex-wrap items-center gap-4">
    <app-subject-search (searchChanged)="onSearch($event)"> </app-subject-search>

    <div class="flex items-center gap-1 rounded-full 
    bg-neutral-800 p-1 text-sm">
      <button
        type="button"
        (click)="setSort('asc')"
        [class]="
          sortDirection === 'asc'
            ? 'rounded-full bg-neutral-700 px-4 py-1.5 text-neutral-100 transition'
            : 'rounded-full px-4 py-1.5 text-neutral-400 transition hover:text-neutral-200'
        "
      >
        Asc
      </button>

      <span class="text-neutral-600">•</span>

      <button
        type="button"
        (click)="setSort('desc')"
        [class]="
          sortDirection === 'desc'
            ? 'rounded-full bg-neutral-700 px-4 py-1.5 text-neutral-100 transition'
            : 'rounded-full px-4 py-1.5 text-neutral-400 transition hover:text-neutral-200'
        "
      >
        Desc
      </button>
    </div>

    <button
      (click)="create.emit()"
      class="rounded-full bg-yellow-400 px-5 py-2 text-sm text-black transition font-bold hover:bg-yellow-500 cusor-pointer"
    >
      + Add Subject
    </button>
  </div>
</div>
