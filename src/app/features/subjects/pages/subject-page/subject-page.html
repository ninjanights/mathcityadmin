@if (isCreating() || isEditing()) {
  <app-subject-form
    [subject]="selectedSubject()"
    (save)="onSave($event)"
    (cancel)="onCancel()"
  ></app-subject-form>
} @else {
  @if (loading()) {
    <div class="flex items-center justify-center py-12">
      <p class="text-neutral-400 font-semibold animate-pulse">Loading subjects...</p>
    </div>
  } @else {
    <app-subject-header
      (create)="onCreate()"
      (search)="onSearch($event)"
      (sort)="onSort($event)"
    ></app-subject-header>
    <app-subject-list
      [subjects]="sortedSubjects()"
      [loading]="loading()"
      (edit)="onEdit($event)"
      (delete)="onDelete($event)"
      (publish)="onPublish($event)"
    ></app-subject-list>
  }
}
