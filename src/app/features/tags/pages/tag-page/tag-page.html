@if (isCreating() || isEditing()) {
  <app-tag-form
    [tag]="selectedTag()"
    (save)="onSave($event)"
    (cancel)="onCancel()"
  ></app-tag-form>
} @else {
  @if (loading()) {
    <div class="flex items-center justify-center py-12">
      <p class="text-neutral-500 font-semibold animate-pulse dark:text-neutral-400">
        Loading Tags...
      </p>
    </div>
  } @else {
    <div class="flex flex-col gap-2">
      <app-tag-header
        (create)="onCreate()"
        (search)="onSearch($event)"
        (sort)="onSort($event)"
      ></app-tag-header>

      <app-tag-list
        [tags]="sortedTags()"
        (edit)="onEdit($event)"
        (delete)="onDelete($event)"
      ></app-tag-list>
    </div>
  }
}
