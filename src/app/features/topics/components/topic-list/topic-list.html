@if (topics().length) {
  <div class="flex flex-col gap-2">
    @for (topic of topics(); track topic.id) {
      <app-topic-card
        [topic]="topic"
        [chapterTitle]="chapterTitle(topic.chapterId)"
        (edit)="edit.emit($event)"
        (delete)="delete.emit($event)"
      ></app-topic-card>
    }
  </div>
} @else {
  <p class="text-neutral-500 dark:text-neutral-400">No topics found.</p>
}
